# SonarQube Project Configuration

# Project identification
sonar.projectKey=PiotrGrzybowski_diffusion
sonar.organization=piotrgrzybowski

sonar.host.url=https://sonarcloud.io

# Source code location
sonar.sources=src
sonar.tests=tests

# Python specific settings
sonar.language=py
sonar.python.version=3.12

# Coverage settings - IMPORTANT: This points to the coverage report
sonar.python.coverage.reportPaths=coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/__pycache__/**,**/.venv/**,**/logs/**,**/*.ipynb,**/.pytest_cache/**
sonar.test.exclusions=tests/**/*

# Coverage exclusions (if you want to exclude specific files from coverage)
sonar.coverage.exclusions=**/tests/**,**/__init__.py,**/scripts/**

# Source file suffixes
sonar.python.file.suffixes=.py
